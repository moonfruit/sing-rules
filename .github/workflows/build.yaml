name: Build sing-box rule-sets
on:
  schedule:
    - cron: "0 0,12 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Set Variables
        run: |
          echo "TAG=$(env TZ=Asia/Shanghai date +%Y%m%d%H%M)" | tee -a "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout Rules
        uses: actions/checkout@v6
        with:
          repository: Loyalsoldier/v2ray-rules-dat
          path: dat
          ref: release

      - name: Restore subscribe cache
        uses: actions/cache@v5
        with:
          path: cache
          key: subscribe-${{ hashFiles('config/subscribe.json') }}-${{ github.run_id }}
          restore-keys: |
            subscribe-${{ hashFiles('config/subscribe.json') }}-
            subscribe-

      - name: Download resources
        env:
          ASH_URL: ${{ secrets.ASH_URL }}
          NANOCLOUD_URL: ${{ secrets.NANOCLOUD_URL }}
        run: ./cached-subscribe.sh

      - name: Preflight
        run: |
          set -o pipefail
          # Manual re-run (attempt > 1) or workflow_dispatch: always succeed
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.run_attempt }}" -gt 1 ]; then
            ./preflight.sh ash.json ash.json.info nanocloud.json nanocloud.json.info || true
            echo "BUILD_RULES=1" | tee -a "$GITHUB_ENV"
            echo "BUILD_CONFIG=1" | tee -a "$GITHUB_ENV"
          else
            ./preflight.sh ash.json ash.json.info nanocloud.json nanocloud.json.info | tee -a "$GITHUB_ENV"
          fi

      - name: Checkout geo
        if: env.BUILD_RULES == 1
        uses: actions/checkout@v6
        with:
          repository: MetaCubeX/geo
          path: geo

      - name: Setup Go
        if: env.BUILD_RULES == 1
        uses: actions/setup-go@v6
        with:
          go-version-file: geo/go.mod
          cache-dependency-path: geo/go.sum

      - name: Install geo
        if: env.BUILD_RULES == 1
        run: |
          cd geo && go install -v ./cmd/geo
          geo | head -1

      - name: Install sing-box
        run: |
          ./install-sing-box.sh
          sing-box version

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install python requirements
        run: pip install -r requirements.txt

      - name: Checkout private
        env:
          GITEE_USER: ${{ secrets.GITEE_USER }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: ./checkout-gitee.sh "$GITEE_USER" "$GITEE_TOKEN"

      - name: Build config
        if: env.BUILD_CONFIG == 1
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: ./build-sing-config.sh "$GITEE_TOKEN"

      - name: Build rule sets
        if: env.BUILD_RULES == 1
        run: ./build-sing-rules.sh

      - name: Commit and Push (private)
        run: ../commit-and-push.sh "Update config" || true
        working-directory: private

      - name: Commit and Push
        run: ./commit-and-push.sh "Update rules" "${{ env.TAG }}"

      - name: Cleanup old tags
        run: ./cleanup-old-tags.sh

      - name: Release
        if: env.BUILD_RULES == 1
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: rules/*
          draft: false
          prerelease: false
          make_latest: "true"

      - name: Setup Node
        if: env.BUILD_RULES == 1
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npmjs
        if: env.BUILD_RULES == 1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ./npm-publish.sh  "${{ env.TAG }}"
